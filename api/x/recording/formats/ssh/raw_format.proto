syntax = "proto3";

package pomerium.x.recording.formats.ssh;

import "api/extensions/filters/network/ssh/ssh.proto";
import "envoy/config/core/v3/extension.proto";
import "envoy/config/core/v3/grpc_service.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pomerium/envoy-custom/api/x/recording/formats/ssh";

message Config {
  UploadConfig upload_config = 1;
}

enum BufferExhaustMode {
  // If the per-connection buffer is exhausted, disconnect
  Disconnect = 0;
  // If the per-connection buffer is exhausted, block and wait until space becomes available
  Block = 1;
}

message UploadConfig {
  // Size of the per-connection recording buffer containing data pending upload to the recording
  // server
  uint64 default_buffer_size = 1;

  message Pipe {
    int32 write_fd = 1;
    int32 read_fd  = 2;
  }
  message SharedMemory {
    uint64 address = 1;
  }
  message GrpcService {
    envoy.config.core.v3.GrpcService service = 1;
  }

  oneof connection_mode {
    // Upload recordings via pipe file descriptor managed by the parent process
    Pipe pipe = 3;
    // Upload recordings using shared memory
    SharedMemory shared_memory = 4;
    // Upload to a grpc service
    GrpcService grpc_service = 5;
  }

  // Optional recording compression
  envoy.config.core.v3.TypedExtensionConfig compression = 6;

  // Number of worker threads used to process and upload recordings (default 2, minimum 1)
  optional uint32 concurrency = 7;
}

// This extension is added to [pomerium.extensions.ssh.UpstreamTarget] to enable session recording
// and configure related options.
message UpstreamTargetExtensionConfig {
  // What to do if the buffer runs out of space for this connection
  BufferExhaustMode buffer_exhaust_mode = 1;
  // Override the default buffer size
  optional uint64 buffer_size = 2;
}

message RecordingMetadata {
  uint32                    protocol_version  = 1;
  uint64                    uncompressed_size = 4;
  google.protobuf.Timestamp start_time        = 5;
  string                    login_name        = 6;
  string                    session_id        = 7;
  string                    user_id           = 8;
  uint64                    stream_id         = 9;
  string                    route_name        = 10;
  pomerium.extensions.ssh.UpstreamTarget       upstream = 11;
  pomerium.extensions.ssh.SSHDownstreamPTYInfo pty_info = 12;
}

message RecordingTrailer {
  google.protobuf.Timestamp end_time = 1;

  enum DisconnectReason {
    Unknown                = 0;
    DownstreamDisconnected = 1;
    UpstreamDisconnected   = 2;
    SessionExpired         = 3;
  }
  DisconnectReason disconnect_reason = 2;
}

enum PacketDirection {
  UPSTREAM_TO_DOWNSTREAM = 0;
  DOWNSTREAM_TO_UPSTREAM = 1;
}

message Packet {
  // Time delta relative to the previous packet, or 0 for the first packet.
  // Encoding timestamps this way will compress better compared to full unix timestamps.
  int64           time_delta_ms = 1;
  PacketDirection direction     = 2;
  oneof payload {
    // Raw contents of ChannelDataMsg. This is an optimization to avoid encoding the message
    // type, size, etc., since the majority of packets will be ChannelDataMsg.
    bytes channel_data = 3;
    // Any SSH message
    bytes ssh_message = 4;
  }
}
