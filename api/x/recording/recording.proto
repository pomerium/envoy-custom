syntax = "proto3";

package pomerium.x.recording;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";

option go_package = "github.com/pomerium/envoy-custom/api/x/recording";

service RecordingService {
  rpc Record(stream RecordingData) returns (stream RecordingCheckpoint);
}

message RecordingCheckpoint {
  string            recording_id = 1;
  ChunkManifest     manifest     = 2;
  google.rpc.Status status       = 3;
}

message RecordingData {
  string recording_id = 1;
  oneof data {
    RecordingMetadata metadata = 2;
    bytes             chunk    = 3;
    bytes             checksum = 4;
    RecordingTrailer  trailer  = 5;
  }
}

enum RecordingFormat {
  RecordingFormatUnknown = 0;
  RecordingFormatSSH     = 1;
}

message RecordingMetadata {
  RecordingFormat     recordingType = 2;
  google.protobuf.Any metadata      = 3;
}

message RecordingTrailer {
  string              envoy_version = 1;
  google.protobuf.Any metadata      = 3;
}

message ChunkManifest {
  repeated ChunkMetadata items = 1;
}

message ChunkMetadata {
  uint32                    size     = 1;
  bytes                     checksum = 2;
  google.protobuf.Timestamp start    = 3;
  google.protobuf.Timestamp end      = 4;
}
