name: Test (Linux)

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-coverage:
    # Skip fork PRs (security: self-hosted runners) and ci-not-ready label
    if: >-
      (github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository)
      && (github.event_name != 'pull_request'
      || !contains(github.event.pull_request.labels.*.name, 'ci-not-ready'))
    runs-on: envoy-custom-homelab
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install dependencies
        run: |
          sudo apt-get update && sudo apt-get -y install lcov zstd
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bazel" --version

      - name: configure workflow-specific bazel settings
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          common:buildbarn --spawn_strategy=remote,sandboxed
          common:buildbarn --remote_download_minimal
          BAZELRC

      - name: test
        run: |
          bazel coverage --config=buildbarn --test_output=errors //test/...
          tar xf bazel-out/_coverage/_coverage_report.dat ./lcov

      - name: upload to coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov

  test-asan:
    # Skip fork PRs (security: self-hosted runners) and ci-not-ready label
    if: >-
      (github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository)
      && (github.event_name != 'pull_request'
      || !contains(github.event.pull_request.labels.*.name, 'ci-not-ready'))
    runs-on: envoy-custom-homelab
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install bazelisk
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bazel" --version

      - name: configure workflow-specific bazel settings
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          common:buildbarn --spawn_strategy=remote,sandboxed
          common:buildbarn --remote_download_minimal
          BAZELRC

      - name: test
        id: asan-test
        run: bazel test --config=buildbarn  --config=asan --test_output=errors //test/...

  test-tsan:
    # Skip fork PRs (security: self-hosted runners) and ci-not-ready label
    if: >-
      (github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository)
      && (github.event_name != 'pull_request'
      || !contains(github.event.pull_request.labels.*.name, 'ci-not-ready'))
    runs-on: envoy-custom-homelab
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install bazelisk
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bazel" --version

      - name: configure workflow-specific bazel settings
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          common:buildbarn --spawn_strategy=remote,sandboxed
          common:buildbarn --remote_download_minimal
          BAZELRC

      - name: test
        id: tsan-test
        run: bazel test --config=buildbarn  --config=tsan --test_output=errors //test/...

