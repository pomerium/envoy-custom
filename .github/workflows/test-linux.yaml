name: Test (Linux)

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-coverage:
    # Only run on gebru for authors with write access; skip ci-not-ready PRs.
    if: >-
      github.event_name != 'pull_request'
      || (!contains(github.event.pull_request.labels.*.name, 'ci-not-ready')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    runs-on: gebru
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: install lcov
        run: sudo apt -y install lcov

      - name: setup bazel
        uses: bazel-contrib/setup-bazel@e8776f58fb6a6e9055cbaf1b38c52ccc5247e9c4
        with:
          bazelisk-version: 1.25.0
          bazelisk-cache: true
          repository-cache: true

      - name: configure LLVM toolchain for remote workers
        run: |
          cat > clang.bazelrc << 'CLANGRC'
          build:clang --host_action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin --action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          build:clang --action_env=LLVM_CONFIG=/toolchains/bin/llvm-config --host_action_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --repo_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --linkopt=-L/toolchains/lib
          build:clang --linkopt=-Wl,-rpath,/toolchains/lib
          build:asan --linkopt=-L/toolchains/lib/clang/19/lib/x86_64-unknown-linux-gnu
          CLANGRC

      - name: configure remote execution
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          common:gebru --remote_executor=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --remote_cache=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --jobs=64
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100
          build:gebru --host_platform=@local_config_platform//:host
          build:gebru --remote_download_toplevel
          build:gebru --remote_default_exec_properties=container-image=docker://docker.io/joekralicky/envoy-build@sha256:66cc767c0c5c8a851c1234ad52ea8fecae555bdab6e70d9d583119c4795aa71a
          BAZELRC

      - name: test
        run: |
          bazel coverage --config=gebru --test_output=errors //test/...
          tar xf bazel-out/_coverage/_coverage_report.dat ./lcov

      - name: upload to coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov

  test-asan:
    # Only run on gebru for authors with write access; skip ci-not-ready PRs.
    if: >-
      github.event_name != 'pull_request'
      || (!contains(github.event.pull_request.labels.*.name, 'ci-not-ready')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    runs-on: gebru
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: setup bazel
        uses: bazel-contrib/setup-bazel@e8776f58fb6a6e9055cbaf1b38c52ccc5247e9c4
        with:
          bazelisk-version: 1.25.0
          bazelisk-cache: true
          repository-cache: true

      - name: configure LLVM toolchain for remote workers
        run: |
          cat > clang.bazelrc << 'CLANGRC'
          build:clang --host_action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin --action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          build:clang --action_env=LLVM_CONFIG=/toolchains/bin/llvm-config --host_action_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --repo_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --linkopt=-L/toolchains/lib
          build:clang --linkopt=-Wl,-rpath,/toolchains/lib
          build:asan --linkopt=-L/toolchains/lib/clang/19/lib/x86_64-unknown-linux-gnu
          CLANGRC

      - name: configure remote execution
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          common:gebru --remote_executor=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --remote_cache=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --jobs=64
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100
          build:gebru --host_platform=@local_config_platform//:host
          build:gebru --remote_download_toplevel
          build:gebru --remote_default_exec_properties=container-image=docker://docker.io/joekralicky/envoy-build@sha256:66cc767c0c5c8a851c1234ad52ea8fecae555bdab6e70d9d583119c4795aa71a
          BAZELRC

      - name: test
        run: bazel test --config=gebru -c dbg --config=asan --test_output=errors //test/...
