name: Build (BuildBarn PoC)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Skip if PR has ci-not-ready label
    if: "!contains(github.event.pull_request.labels.*.name, 'ci-not-ready')"
    runs-on: gebru
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bazel" --version

      - name: Configure LLVM toolchain for remote workers
        run: |
          # Generate clang.bazelrc pointing to /toolchains — the LLVM
          # installation path inside BuildBarn's worker container image
          # (joekralicky/envoy-build). This is imported via envoy.bazelrc's
          # "try-import %workspace%/clang.bazelrc" and causes toolchains.bzl
          # to set toolchain_roots = "/toolchains" instead of downloading LLVM.
          cat > clang.bazelrc << 'CLANGRC'
          build:clang --host_action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin --action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          build:clang --action_env=LLVM_CONFIG=/toolchains/bin/llvm-config --host_action_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --repo_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --linkopt=-L/toolchains/lib
          build:clang --linkopt=-Wl,-rpath,/toolchains/lib
          build:asan --linkopt=-L/toolchains/lib/clang/19/lib/x86_64-unknown-linux-gnu
          CLANGRC

      - name: Configure remote execution
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          # BuildBarn remote execution via k8s service DNS (runner pod → frontend pod)
          common:gebru --remote_executor=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --remote_cache=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --jobs=64
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100

          # Use the auto-detected local platform to avoid EngFlow-specific
          # exec_properties from @clang_platform / @envoy//bazel/platforms/rbe
          build:gebru --host_platform=@local_config_platform//:host

          # Download top-level outputs only — cluster-internal transfers are fast,
          # and we may want the binary for testing. Intermediate artifacts
          # stay in BuildBarn's CAS.
          build:gebru --remote_download_toplevel

          # Remote exec properties — tell BuildBarn which worker image to use.
          # Must match the platform properties in the BuildBarn worker config.
          build:gebru --remote_default_exec_properties=container-image=docker://docker.io/joekralicky/envoy-build@sha256:66cc767c0c5c8a851c1234ad52ea8fecae555bdab6e70d9d583119c4795aa71a
          BAZELRC

      - name: Build Envoy
        run: |
          set -o pipefail
          echo "::group::Bazel build"
          bazel build --config=gebru //:envoy --verbose_failures 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Build summary
        if: always()
        run: |
          echo "## BuildBarn PoC — Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Build did NOT complete successfully" build.log 2>/dev/null; then
            echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
          elif grep -q "Build completed successfully" build.log 2>/dev/null; then
            echo "✅ **Build succeeded**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build status unknown**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract timing and process info from Bazel output
          grep -E "^INFO: (Elapsed time|Found|[0-9]+ process)" build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Remote executor: BuildBarn on gebru (k8s cluster)*" >> $GITHUB_STEP_SUMMARY
