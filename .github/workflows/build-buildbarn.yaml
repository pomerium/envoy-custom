name: Build (BuildBarn PoC)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Skip if PR has ci-not-ready label (matches existing CI pattern)
    if: "!contains(github.event.pull_request.labels.*.name, 'ci-not-ready')"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
          # No disk-cache — BuildBarn provides remote caching

      - name: Configure remote execution
        env:
          BUILDBARN_ENDPOINT: ${{ secrets.BUILDBARN_ENDPOINT }}
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          # BuildBarn remote execution via Tailscale Funnel (generated by CI)
          common:gebru --jobs=16
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100

          # Use the auto-detected local platform to avoid EngFlow-specific
          # exec_properties from @clang_platform / @envoy//bazel/platforms/rbe
          build:gebru --host_platform=@local_config_platform//:host

          # Force IPv4 — Tailscale Funnel's AAAA record doesn't route from GH runners
          startup:gebru --host_jvm_args=-Djava.net.preferIPv4Stack=true
          BAZELRC
          echo "common:gebru --remote_executor=${BUILDBARN_ENDPOINT}" >> user.bazelrc
          echo "common:gebru --remote_cache=${BUILDBARN_ENDPOINT}" >> user.bazelrc

      - name: Build Envoy
        run: |
          echo "::group::Bazel build"
          bazel build --config=gebru //:envoy --verbose_failures 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Build summary
        if: always()
        run: |
          echo "## BuildBarn PoC — Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Build completed successfully" build.log 2>/dev/null; then
            echo "✅ **Build succeeded**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract timing and process info from Bazel output
          grep -E "^INFO: (Elapsed time|Found|[0-9]+ process)" build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Remote executor: BuildBarn on gebru via Tailscale Funnel*" >> $GITHUB_STEP_SUMMARY
