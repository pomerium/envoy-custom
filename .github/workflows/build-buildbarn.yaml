name: Build (BuildBarn PoC)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Skip if PR has ci-not-ready label (matches existing CI pattern)
    if: "!contains(github.event.pull_request.labels.*.name, 'ci-not-ready')"
    runs-on: self-hosted
    environment: buildbarn
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
          # No disk-cache — BuildBarn provides remote caching

      - name: Configure remote execution
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          # BuildBarn remote execution on localhost (self-hosted runner on gebru)
          common:gebru --remote_executor=grpc://localhost:8980
          common:gebru --remote_cache=grpc://localhost:8980
          common:gebru --jobs=64
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100

          # Use the auto-detected local platform to avoid EngFlow-specific
          # exec_properties from @clang_platform / @envoy//bazel/platforms/rbe
          build:gebru --host_platform=@local_config_platform//:host

          # Download top-level outputs only — localhost transfers are fast,
          # and we may want the binary for testing. Intermediate artifacts
          # stay in BuildBarn's CAS.
          build:gebru --remote_download_toplevel
          BAZELRC

      - name: Build Envoy
        run: |
          set -o pipefail
          echo "::group::Bazel build"
          bazel build --config=gebru //:envoy --verbose_failures 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Build summary
        if: always()
        run: |
          echo "## BuildBarn PoC — Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Build did NOT complete successfully" build.log 2>/dev/null; then
            echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
          elif grep -q "Build completed successfully" build.log 2>/dev/null; then
            echo "✅ **Build succeeded**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build status unknown**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract timing and process info from Bazel output
          grep -E "^INFO: (Elapsed time|Found|[0-9]+ process)" build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Remote executor: BuildBarn on gebru (localhost)*" >> $GITHUB_STEP_SUMMARY
