name: Build & Publish Images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    # Skip if PR has ci-not-ready label
    if: >-
      github.event_name != 'pull_request'
      || !contains(github.event.pull_request.labels.*.name, 'ci-not-ready')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform_flag: ""
          - arch: arm64
            platform_flag: "--platforms=//bazel/platforms/rbe:linux_arm64"
    runs-on: gebru
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bazel" --version

      - name: Configure LLVM toolchain for remote workers
        run: |
          cat > clang.bazelrc << 'CLANGRC'
          build:clang --host_action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin --action_env=PATH=/toolchains/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          build:clang --action_env=LLVM_CONFIG=/toolchains/bin/llvm-config --host_action_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --repo_env=LLVM_CONFIG=/toolchains/bin/llvm-config
          build:clang --linkopt=-L/toolchains/lib
          build:clang --linkopt=-Wl,-rpath,/toolchains/lib
          build:asan --linkopt=-L/toolchains/lib/clang/19/lib/x86_64-unknown-linux-gnu
          CLANGRC

      - name: Configure remote execution
        run: |
          cat >> user.bazelrc << 'BAZELRC'
          # BuildBarn remote execution via k8s service DNS
          common:gebru --remote_executor=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --remote_cache=grpc://frontend.buildbarn.svc.cluster.local:8980
          common:gebru --jobs=64
          common:gebru --remote_timeout=3600
          common:gebru --spawn_strategy=remote,sandboxed,local
          common:gebru --remote_max_connections=100
          build:gebru --host_platform=@local_config_platform//:host
          build:gebru --remote_download_toplevel
          build:gebru --remote_default_exec_properties=container-image=docker://ghcr.io/pomerium/envoy-build:22.1.1-1@sha256:77b3807b4109237d5a22d296f468352cc4680f0181c2038d055926872a85ecc4
          BAZELRC

      - name: Configure registry credentials
        if: github.event_name != 'pull_request'
        run: |
          # Set up Docker config so crane (used by update_index) can push.
          # crane reads ~/.docker/config.json for registry auth.
          mkdir -p ~/.docker
          echo '{"auths":{"ghcr.io":{"auth":"'"$(echo -n '${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}' | base64 -w0)"'"}}}' > ~/.docker/config.json

      - name: Build image (${{ matrix.arch }})
        run: |
          set -o pipefail
          echo "::group::Bazel build (${{ matrix.arch }})"
          bazel build --config=gebru -c dbg ${{ matrix.platform_flag }} \
            //:update_index.envoy.image \
            --verbose_failures 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Push image (${{ matrix.arch }})
        if: github.event_name != 'pull_request'
        run: |
          echo "::group::Push ${{ matrix.arch }} image and update index"
          bazel run --config=gebru -c dbg ${{ matrix.platform_flag }} \
            //:update_index.envoy.image
          echo "::endgroup::"

      - name: Build summary
        if: always()
        run: |
          echo "## Build Results (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Build did NOT complete successfully" build.log 2>/dev/null; then
            echo "**Build failed**" >> $GITHUB_STEP_SUMMARY
          elif grep -q "Build completed successfully" build.log 2>/dev/null; then
            echo "**Build succeeded**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build status unknown**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          grep -E "^INFO: (Elapsed time|Found|[0-9]+ process)" build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Remote executor: BuildBarn on gebru (k8s cluster)*" >> $GITHUB_STEP_SUMMARY
